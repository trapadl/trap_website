<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>coaster. admin — trap.</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="admin-body">

  <!-- ===== UNSUPPORTED DEVICE (mobile < 1024px) ===== -->
  <div class="admin-screen is-hidden" id="unsupported-screen">
    <p class="admin-unsupported">The admin portal is only available on desktop.</p>
  </div>

  <!-- ===== AUTH SCREEN ===== -->
  <div class="admin-screen is-hidden" id="auth-screen">
    <div class="auth-box">
      <h1 class="auth-heading">coaster. admin</h1>
      <div class="auth-field">
        <label class="auth-label" for="password-input">Password</label>
        <input
          class="auth-input"
          type="password"
          id="password-input"
          autocomplete="current-password"
          enterkeyhint="done"
        >
      </div>
      <p class="auth-error is-hidden" id="auth-error">Incorrect password.</p>
      <button class="btn btn--primary" id="login-btn">Log in</button>
    </div>
  </div>

  <!-- ===== ADMIN VIEW ===== -->
  <div class="admin-screen is-hidden" id="admin-view">

    <header class="admin-header">
      <span class="admin-header__title">coaster. admin</span>
      <div class="admin-header__actions">
        <span class="admin-header__count" id="submission-count"></span>
        <button class="btn btn--tertiary admin-header__logout" id="logout-btn">log out</button>
      </div>
    </header>

    <main class="admin-main">
      <div class="admin-list" id="submission-list">
        <!-- AdminCards injected by script.js -->
        <p class="admin-loading" id="admin-loading">Loading submissions...</p>
      </div>
    </main>

  </div>

  <script src="script.js"></script>
</body>
</html>
